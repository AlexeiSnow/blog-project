{% extends 'blog/base.html' %}
{% block title %}Теги{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0"><i class="bi bi-tags"></i> Теги</h1>
            {% if user.is_authenticated %}
                <a href="/tags/create/" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus"></i> Создать тег
                </a>
            {% endif %}
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                {% for tag in tags %}
                    <a href="/tags/{{ tag.id }}/" class="badge bg-secondary text-decoration-none me-2 mb-2 p-2 fs-6">
                        {{ tag.name }}
                    </a>
                {% empty %}
                    <p class="text-muted mb-0">Тегов пока нет. <a href="/tags/create/">Создать первый</a></p>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
