{% extends 'blog/base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title text-center mb-4">Вход</h2>
                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Логин</label>
                        <input type="text" name="username" class="form-control" placeholder="Введите логин">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="Введите пароль">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-2">Войти</button>
                </form>
                <hr>
                <p class="text-center mb-0">Нет аккаунта? <a href="/register/">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
