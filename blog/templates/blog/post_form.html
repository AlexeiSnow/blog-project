{% extends 'blog/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-4">{{ title }}</h1>
                {% if form.errors %}
                    <div class="alert alert-danger">{{ form.errors }}</div>
                {% endif %}
                <form method="post" id="postForm">
                    {% csrf_token %}

                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Заголовок</label>
                        <input type="text" name="title" value="{{ form.title.value|default:'' }}"
                               class="form-control" placeholder="Заголовок поста">
                    </div>

                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Содержание</label>
                        <textarea name="content" class="form-control" rows="8"
                                  placeholder="Текст поста...">{{ form.content.value|default:'' }}</textarea>
                    </div>

                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Доступ</label>
                        <select name="access" class="form-select">
                            <option value="public" {% if form.access.value == 'public' %}selected{% endif %}>Публичный</option>
                            <option value="private" {% if form.access.value == 'private' %}selected{% endif %}>По запросу</option>
                        </select>
                    </div>

                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Теги</label>
                        <select name="tags" class="form-select" multiple id="tagsSelect">
                            <option value="__new__">➕ Добавить тег...</option>
                            {% for tag in form.tags.field.queryset %}
                                <option value="{{ tag.id }}">{{ tag.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="form-text">Удерживай Ctrl для выбора нескольких тегов</div>

                        
                        <div id="newTagBlock" class="mt-2" style="display:none;">
                            <div class="input-group">
                                <input type="text" id="newTagInput" class="form-control"
                                       placeholder="Название нового тега">
                                <button type="button" class="btn btn-success" onclick="createTag()">
                                    <i class="bi bi-plus"></i> Создать
                                </button>
                                <button type="button" class="btn btn-outline-secondary" onclick="hideNewTag()">
                                    Отмена
                                </button>
                            </div>
                            <div id="tagError" class="text-danger small mt-1" style="display:none;"></div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Сохранить
                        </button>
                        <a href="/" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>

document.getElementById('tagsSelect').addEventListener('change', function() {
    const selected = Array.from(this.selectedOptions).map(o => o.value);
    if (selected.includes('__new__')) {
        Array.from(this.options).forEach(o => {
            if (o.value === '__new__') o.selected = false;
        });
        showNewTag();
    }
});

function showNewTag() {
    document.getElementById('newTagBlock').style.display = 'block';
    document.getElementById('newTagInput').focus();
}

function hideNewTag() {
    document.getElementById('newTagBlock').style.display = 'none';
    document.getElementById('newTagInput').value = '';
    document.getElementById('tagError').style.display = 'none';
}

function createTag() {
    const name = document.getElementById('newTagInput').value.trim();
    if (!name) {
        document.getElementById('tagError').textContent = 'Введите название тега';
        document.getElementById('tagError').style.display = 'block';
        return;
    }

    
    fetch('/tags/create/ajax/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify({ name: name })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            
            const select = document.getElementById('tagsSelect');
            const option = new Option(data.name, data.id, true, true);
            select.add(option);
            hideNewTag();
        } else {
            document.getElementById('tagError').textContent = data.error;
            document.getElementById('tagError').style.display = 'block';
        }
    });
}
</script>
{% endblock %}
